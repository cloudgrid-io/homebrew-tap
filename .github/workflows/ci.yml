name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: LICENSE is Apache 2.0
        run: |
          if [ ! -f LICENSE ]; then
            echo "LICENSE file is missing"
            exit 1
          fi
          if ! grep -q "Apache License" LICENSE || ! grep -q "Version 2.0" LICENSE; then
            echo "LICENSE is not Apache License 2.0"
            exit 1
          fi
          echo "LICENSE is Apache 2.0"

  brew-lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: brew style
        run: brew style Formula/cloudgrid.rb
      - name: brew audit
        run: brew audit --strict --online --new Formula/cloudgrid.rb
